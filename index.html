<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanques - Diseño Ladrillos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ladrillo: '#92562A',
                        ladrilloClaro: '#B47448',
                        ladrilloOscuro: '#704220',
                        metal: '#B0B0B0',
                        metalOscuro: '#787878',
                        fondo: '#000000',
                        bala: '#FF7D00',
                        ataque: '#EF4444',
                        defensa: '#3B82F6',
                        movilidad: '#22C55E',
                        estrategia: '#EAB308',
                        legendaria: '#A855F7',
                    },
                    fontFamily: {
                        game: ['"Press Start 2P"', 'monospace'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .pixel-border {
                box-shadow: 
                    0 0 0 2px #111,
                    0 0 0 4px #fff,
                    0 0 0 6px #111;
            }
            .text-shadow {
                text-shadow: 2px 2px 0 #000;
            }
            .color-option {
                width: 45px;
                height: 45px;
                border: 3px solid #fff;
                border-radius: 6px;
                cursor: pointer;
                transition: all 0.2s ease;
            }
            .color-option:hover, .color-option.selected {
                transform: scale(1.15);
                border-color: #FFD700;
                box-shadow: 0 0 10px #FFD70080;
            }
            .icono-habilidad {
                font-size: 14px;
                margin-right: 6px;
            }
        }
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * {
            font-family: 'Press Start 2P', monospace;
            user-select: none;
        }
        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body class="bg-fondo text-white overflow-hidden flex flex-col items-center justify-center min-h-screen m-0 p-4">
    <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold mb-4 text-yellow-400 text-shadow">TANQUES: SUPERVIVENCIA</h1>
    
    <div class="relative">
        <canvas id="canvas" width="800" height="500" class="bg-black rounded-lg pixel-border"></canvas>
        
        <!-- Pantalla de inicio con selección de color -->
        <div id="pantallaInicio" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center rounded-lg z-10">
            <h2 class="text-3xl text-green-400 mb-6 text-shadow">¡BIENVENIDO!</h2>
            
            <!-- Selección libre de color -->
            <div class="mb-8 text-center">
                <p class="text-sm mb-4">ELIGE EL COLOR DE TU TANQUE</p>
                <div class="flex gap-5 justify-center">
                    <div class="color-option selected" data-color="#EF4444" style="background-color:#EF4444;" title="Rojo"></div>
                    <div class="color-option" data-color="#22C55E" style="background-color:#22C55E;" title="Verde"></div>
                    <div class="color-option" data-color="#EAB308" style="background-color:#EAB308;" title="Amarillo"></div>
                    <div class="color-option" data-color="#165DFF" style="background-color:#165DFF;" title="Azul"></div>
                </div>
            </div>

            <p class="text-sm mb-3 text-center px-10">← → Mover | ESPACIO Saltar | F Disparar | C Colocar Mina</p>
            <p class="text-sm mb-6 text-center px-10">Recoge poderes y elimina enemigos</p>
            <button id="btnIniciar" class="bg-green-500 hover:bg-green-600 text-white px-8 py-3 rounded-lg transition-all transform hover:scale-105 pixel-border text-lg">
                INICIAR JUEGO
            </button>
        </div>

        <!-- Pantalla de Game Over -->
        <div id="pantallaGameOver" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center rounded-lg z-20 hidden">
            <h2 class="text-4xl text-red-500 mb-6 text-shadow">GAME OVER</h2>
            <p class="text-xl mb-4">Puntuación: <span id="puntuacionFinal">0</span></p>
            <p class="text-sm mb-8">¿Podrás superar tu marca?</p>
            <button id="btnReiniciar" class="bg-red-500 hover:bg-red-600 text-white px-8 py-3 rounded-lg transition-all transform hover:scale-105 pixel-border text-lg">
                VOLVER A JUGAR
            </button>
        </div>

        <!-- Información del juego -->
        <div class="absolute top-4 left-4 flex flex-col gap-2">
            <div class="bg-black/60 px-4 py-2 rounded-lg">
                <span class="text-yellow-400">PUNTOS: </span>
                <span id="puntuacion">0</span>
            </div>
            <div class="bg-black/60 px-4 py-2 rounded-lg">

                <span id="vidas">3</span>
            </div>
            <div class="bg-black/60 px-4 py-2 rounded-lg text-xs">
                <span class="text-sky-300">MINAS: </span>
                <span id="minasJugador">0</span>
            </div>
        </div>

        <!-- Indicador de habilidades activas -->
        <div id="habilidadesActivas" class="absolute top-4 right-4 flex flex-col gap-1 text-xs max-w-[180px]"></div>
    </div>

    <p class="text-xs mt-4 text-gray-400">© 2026 - Diseño Ladrillos</p>

    <script>

        // 🟢 TODAS LAS HABILIDADES SOLICITADAS
        const TIPOS_HABILIDADES = [

            {

                    entidad.y = Math.random() * (canvas.height - entidad.alto - 50);

            // 🎯 CONTROL Y ESTRATEGIA
            {

            {

                efecto: (entidad) => {

                }
            },
            {

                descripcion: 'Atrae tanques cercanos.',
                efecto: (entidad) => {

            {

                efecto: (entidad) => {

                }

            // ⭐ LEGENDARIAS
            {
                id: 'modo_berserker',
                nombre: 'Modo Berserker',
                icono: '☢',
                categoria: 'legendaria',
                color: '#A855F7',
                duracion: 12000,
                descripcion: 'Disparo x2, defensa -50%.',
                efecto: (entidad) => {

                }
            },
            {
                id: 'tanque_dron',
                nombre: 'Tanque Dron',
                icono: '🤖',
                categoria: 'legendaria',
                color: '#A855F7',
                duracion: 20000,
                descripcion: 'Invoca dron que ataca solo.',
                efecto: (entidad) => {

            {

                categoria: 'legendaria',
                color: '#A855F7',
                duracion: 0,
                descripcion: 'Lanza misiles en todas direcciones.',

                }
            },
            {
                id: 'ultima_resistencia',
                nombre: 'Última Resistencia',
                icono: '💀',
                categoria: 'legendaria',
                color: '#A855F7',
                duracion: 10000,
                descripcion: 'Poca vida = daño y velocidad x2.',
                efecto: (entidad) => {
                    if(entidad.salud < entidad.saludMaxima * 0.3) {
                        entidad.danoMultiplicador = 2;
                        entidad.velocidadMovimiento *= 2;
                        entidad.tiempoFinResistencia = Date.now() + 10000;
                    }
                }
            },
            {
                id: 'fortaleza_movil',
                nombre: 'Fortaleza Móvil',
                icono: '🏰',
                categoria: 'legendaria',
                color: '#A855F7',
                duracion: 15000,
                descripcion: 'Muy resistente, muy lento.',
                efecto: (entidad) => {
                    entidad.danoRecibidoMultiplicador = 0.2;
                    entidad.velocidadMovimiento *= 0.4;
                    entidad.tiempoFinFortaleza = Date.now() + 15000;
                }
            }
        ];

        // Objeto: Tanque del jugador
        const jugador = {
            x: 380,
            y: 440,
            ancho: 40,
            alto: 30,
            velocidadX: 0,
            velocidadY: 0,
            velocidadMovimiento: 5,
            velocidadMovimientoBase: 5,
            velocidadDisparo: 1,
            nivelVelocidad: 1,
            estaEnSuelo: false,
            direccion: 1,
            cooldownDisparo: 20,
            salud: 100,
            saludMaxima: 100,
            saludMaximaOriginal: 100,
            danoMultiplicador: 1,
            danoRecibidoMultiplicador: 1,
            puedeDisparar: true,
            color: '#EF4444'
        };

        // Controles del teclado
        const teclas = {
            izquierda: false,
            derecha: false,
            salto: false,
            disparo: false,
            colocarMina: false
        };

        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowLeft') teclas.izquierda = true;
            if(e.key === 'ArrowRight') teclas.derecha = true;
            if(e.key === ' ' || e.key === 'Spacebar') teclas.salto = true;
            if(e.key === 'f' || e.key === 'F') teclas.disparo = true;
            if(e.key === 'c' || e.key === 'C') teclas.colocarMina = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.key === 'ArrowLeft') teclas.izquierda = false;
            if(e.key === 'ArrowRight') teclas.derecha = false;
            if(e.key === ' ' || e.key === 'Spacebar') teclas.salto = false;
            if(e.key === 'f' || e.key === 'F') teclas.disparo = false;
            if(e.key === 'c' || e.key === 'C') teclas.colocarMina = false;
        });

        // Clase para Enemigos
        class Enemigo {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.ancho = 40;
                this.alto = 30;
                this.velocidadX = 2;
                this.velocidadY = 0;
                this.velocidadMovimiento = 2;
                this.velocidadMovimientoBase = 2;
                this.velocidadDisparo = 1;
                this.nivelVelocidad = 1;
                this.direccion = Math.random() > 0.5 ? 1 : -1;
                this.estaEnSuelo = false;
                this.salud = 100;
                this.saludMaxima = 100;
                this.saludMaximaOriginal = 100;
                this.danoMultiplicador = 1;
                this.danoRecibidoMultiplicador = 1;
                this.puedeDisparar = true;
                this.cooldownDisparo = 100;
                this.color = '#F53F3F';
            }

            actualizar() {
                this.verificarDuracionHabilidades();

                if(this.estaCongelado) {
                    this.velocidadMovimiento = this.velocidadMovimientoBase * 0.4;
                } else {
                    this.velocidadMovimiento = this.velocidadMovimientoBase;
                }

                this.x += this.velocidadMovimiento * this.direccion;
                if(this.x < 0 || this.x + this.ancho > canvas.width) this.direccion *= -1;

                this.velocidadY += gravedad;
                this.y += this.velocidadY;

                this.estaEnSuelo = false;
                bloques.forEach(bloque => {
                    if(!this.esFantasma && this.colision(this, bloque)) {
                        if(this.velocidadY > 0) {
                            this.y = bloque.y - this.alto;
                            this.velocidadY = 0;
                            this.estaEnSuelo = true;
                        }
                    }
                });

                powerUps.forEach((p, i) => {
                    if (colision(this, p)) {
                        TIPOS_HABILIDADES[p.tipo].efecto(this);
                        powerUps.splice(i, 1);
                    }
                });

                this.cooldownDisparo--;
                if(this.puedeDisparar && this.cooldownDisparo <= 0) {
                    this.disparar();
                    this.cooldownDisparo = 80 + Math.random() * 60;
                }
            }

            disparar() {
                let dano = 100 * this.danoMultiplicador;
                balasEnemigas.push({
                    x: this.direccion === 1 ? this.x + this.ancho : this.x,
                    y: this.y + this.alto / 2 - 3,
                    ancho: 8, alto: 6,
                    velocidad: 6 * this.direccion,
                    dano: dano,
                    color: '#FF4D4F',
                    perforante: this.habilidadDisparoPerforante || false,
                    rebota: this.habilidadPlasma || false
                });
            }

            verificarDuracionHabilidades() {
                Object.keys(this).forEach(prop => {
                    if(prop.startsWith('tiempoFin') && this[prop] < Date.now()) {
                        const habilidad = prop.replace('tiempoFin', '').toLowerCase();
                        delete this[`habilidad_${habilidad}`];
                        delete this[prop];
                        if(habilidad === 'escudoenergetico') this.puedeDisparar = true;
                        if(habilidad === 'propulsores') this.velocidadMovimiento = this.velocidadMovimientoBase;
                        if(habilidad === 'blindaje') this.danoRecibidoMultiplicador = 1;
                        if(habilidad === 'berserker') { this.velocidadDisparo = 1; this.danoRecibidoMultiplicador = 1; }
                        if(habilidad === 'fortaleza') { this.danoRecibidoMultiplicador = 1; this.velocidadMovimiento = this.velocidadMovimientoBase; }
                        if(habilidad === 'fantasma') delete this.esFantasma;
                    }
                });
            }

            colision(entidad, bloque) {
                return entidad.x < bloque.x + bloque.ancho &&
                       entidad.x + entidad.ancho > bloque.x &&
                       entidad.y < bloque.y + bloque.alto &&
                       entidad.y + entidad.alto > bloque.y;
            }

            dibujar() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.ancho, this.alto);
                ctx.fillRect(this.direccion === 1 ? this.x + this.ancho : this.x - 10, this.y + 10, 12, 8);
                ctx.fillStyle = '#222';
                ctx.fillRect(this.x, this.y + this.alto - 5, this.ancho, 5);
                
                if(this.tieneEscudoEnergetico) {
                    ctx.strokeStyle = '#3B82F6';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(this.x + this.ancho/2, this.y + this.alto/2, this.ancho/1.5, 0, Math.PI*2);
                    ctx.stroke();
                }
                if(this.esFantasma) {
                    ctx.globalAlpha = 0.6;
                    ctx.fillRect(this.x, this.y, this.ancho, this.alto);
                    ctx.globalAlpha = 1;
                }

                ctx.fillStyle = '#333';
                ctx.fillRect(this.x, this.y - 8, this.ancho, 4);
                ctx.fillStyle = this.salud > 50 ? '#22C55E' : '#EF4444';
                ctx.fillRect(this.x, this.y - 8, (this.ancho * this.salud) / this.saludMaxima, 4);
            }
        }

        // Clase PowerUp
        class PowerUp {
            constructor(x, y, tipo) {
                this.x = x;
                this.y = y;
                this.ancho = 26;
                this.alto = 26;
                this.tipo = tipo;
                this.cayendo = true;
                this.destello = 0;
            }
            actualizar() {
                this.y += this.cayendo ? 1.2 : 0;
                bloques.forEach(b => { if (colision(this, b)) this.cayendo = false; });
                if (this.y + this.alto > canvas.height - 10) this.cayendo = false;
                this.destello = (this.destello + 0.15) % Math.PI;
            }
            dibujar() {
                const hab = TIPOS_HABILIDADES[this.tipo];
                ctx.globalAlpha = 0.8 + Math.sin(this.destello) * 0.2;
                ctx.fillStyle = hab.color;
                ctx.fillRect(this.x, this.y, this.ancho, this.alto);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(hab.icono, this.x + this.ancho/2, this.y + this.alto/2 + 5);
                ctx.globalAlpha = 1;
            }
        }

            enemigos = []; balas = []; balasEnemigas = [];

        function actualizarUI() {
            textoPuntuacion.textContent = puntuacion;
            textoVidas.textContent = vidas;
            textoMinasJugador.textContent = jugador.cantidadMinas || 0;
            actualizarIndicadoresHabilidades();
        }

        function actualizarIndicadoresHabilidades() {
            contenedorHabilidades.innerHTML = '';
            TIPOS_HABILIDADES.forEach(habilidad => {
                const id = habilidad.id;
                if(jugador[`habilidad_${id}`] || jugador[`tiene${id}`]) {
                    const div = document.createElement('div');
                    div.className = 'px-2 py-1 rounded text-[10px] flex items-center';
                    div.style.backgroundColor = `var(--${habilidad.categoria}, ${habilidad.color})`;
                    div.innerHTML = `<span class="icono-habilidad">${habilidad.icono}</span> ${habilidad.nombre}`;
                    contenedorHabilidades.appendChild(div);
                }
            });
        }

        function bucleJuego(timestamp = 0) {
            const deltaTime = timestamp - ultimaActualizacion;
            ultimaActualizacion = timestamp;

            if(juegoActivo) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                verificarDuracionHabilidadesJugador();

                // Movimiento jugador
                jugador.velocidadX = 0;
                if(teclas.izquierda) { jugador.velocidadX = -jugador.velocidadMovimiento; jugador.direccion = -1; }
                if(teclas.derecha) { jugador.velocidadX = jugador.velocidadMovimiento; jugador.direccion = 1; }

                jugador.estaEnSuelo = false;
